<title>Blooming leaf branch animation</title>
<desc>A pink leafy branch where the main stem grows from the bottom curl up to the top, then each of the ten leaves blooms one by one with a soft glow, traveling from the lowest leaf to the highest.</desc>

<defs>
<filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
<feGaussianBlur stdDeviation="2.2" result="blur"/>
<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
<radialGradient id="bgGlow" cx="50%" cy="55%" r="65%">
<stop offset="0%" stop-color="#2a1620"/>
<stop offset="100%" stop-color="#0d0810"/>
</radialGradient>
</defs>

<style>
.branch path {
fill: none;
stroke: #EA8B8B;
stroke-width: 3;
stroke-linecap: round;
stroke-linejoin: round;
stroke-dasharray: 100;
stroke-dashoffset: 100;
opacity: 0;
}
.stem-line { animation: drawStem 1.8s ease-out 0.3s forwards; }
.leaf { animation: bloom 1.1s ease-out forwards; }
@keyframes drawStem {
0%   { stroke-dashoffset: 100; opacity: 0; stroke-width: 2; stroke: #FFC4C4; }
20%  { opacity: 0.95; stroke-width: 3.5; }
100% { stroke-dashoffset: 0; opacity: 1; stroke-width: 2.8; stroke: #EA8B8B; }
}
@keyframes bloom {
0%   { stroke-dashoffset: 100; opacity: 0; stroke-width: 5; stroke: #FFE0E0; }
35%  { opacity: 1; stroke-width: 5.5; stroke: #FFC2C2; }
70%  { stroke-width: 4; stroke: #F5A0A0; }
100% { stroke-dashoffset: 0; opacity: 1; stroke-width: 3; stroke: #EA8B8B; }
}
.leaf-1  { animation-delay: 1.9s; }
.leaf-2  { animation-delay: 2.3s; }
.leaf-3  { animation-delay: 2.7s; }
.leaf-4  { animation-delay: 3.1s; }
.leaf-5  { animation-delay: 3.5s; }
.leaf-6  { animation-delay: 3.9s; }
.leaf-7  { animation-delay: 4.3s; }
.leaf-8  { animation-delay: 4.7s; }
.leaf-9  { animation-delay: 5.1s; }
.leaf-10 { animation-delay: 5.5s; }
.branch { animation: breathe 5s ease-in-out 7s infinite; transform-origin: center; }
@keyframes breathe {
0%, 100% { opacity: 1; }
50% { opacity: 0.82; }
}
</style>
