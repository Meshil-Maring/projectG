services:
  - type: web
    name: projectg-server
    env: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 4000
      - key: VITE_API_URL
        value: /api/v1
