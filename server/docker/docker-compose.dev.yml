services:
  postgres:
    image: postgres:17-alpine
    container_name: projectg-postgres
    environment:
      POSTGRES_USER: projectg
      POSTGRES_PASSWORD: projectg
      POSTGRES_DB: projectg
    ports:
      - "5432:5432"
    volumes:
      - projectg_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectg"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  projectg_pgdata:
